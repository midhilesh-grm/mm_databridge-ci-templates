name: dab-deploy

on:
  workflow_call:
    inputs:
      bundle_root:
        description: "Path to the Databricks bundle root"
        required: false
        type: string
        default: "."
      target:
        description: "DAB target name (e.g. dev)"
        required: true
        type: string
      deploy:
        description: "If true, deploy the bundle (otherwise validate only)"
        required: false
        type: boolean
        default: false
      configs_source_path:
        description: "Local path (relative to bundle_root) of config files to upload to Volume. Leave empty to skip."
        required: false
        type: string
        default: ""
      volume_configs_path:
        description: "UC Volume destination path (e.g. /Volumes/catalog/schema/volume/configs). Leave empty to skip."
        required: false
        type: string
        default: ""
    secrets:
      DATABRICKS_HOST:
        required: true
      DATABRICKS_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Bundle validate
        working-directory: ${{ inputs.bundle_root }}
        run: |
          databricks bundle validate -t "${{ inputs.target }}"

      - name: Bundle deploy
        if: ${{ inputs.deploy }}
        working-directory: ${{ inputs.bundle_root }}
        run: |
          databricks bundle deploy -t "${{ inputs.target }}"

      - name: Upload configs to UC Volume
        if: ${{ inputs.deploy && inputs.configs_source_path != '' && inputs.volume_configs_path != '' }}
        working-directory: ${{ inputs.bundle_root }}
        run: |
          echo "Uploading configs from ${{ inputs.configs_source_path }} to ${{ inputs.volume_configs_path }}"
          databricks fs cp --recursive --overwrite \
            "${{ inputs.configs_source_path }}" \
            "${{ inputs.volume_configs_path }}"
          echo "Config upload complete."
